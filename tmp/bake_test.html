<!doctype html>
<html>
<head>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<pre id="out">running…</pre>
<script type="module">
import * as THREE from "three";
const log = (...a) => { document.getElementById("out").textContent += "\n" + a.join(" "); console.log(...a); };

function makeGeom() {
  // 1 triangle, 3 verts with strong colours
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(new Float32Array([0,0,0, 1,0,0, 0,1,0]), 3));
  g.setAttribute("color", new THREE.BufferAttribute(new Float32Array([1,0,0, 0,1,0, 0,0,1]), 3));
  // atlas uv covering most of the target
  g.setAttribute("uv", new THREE.BufferAttribute(new Float32Array([0.1,0.1, 0.9,0.1, 0.1,0.9]), 2));
  return g;
}

const texW = 64, texH = 64;
const renderer = new THREE.WebGLRenderer({ antialias:false, alpha:true });
renderer.setSize(texW, texH, false);
renderer.setClearColor(0x000000, 0);
log("isWebGL2:", renderer.capabilities.isWebGL2);

function bake(mat, label) {
  const geom = makeGeom();
  const rt = new THREE.WebGLRenderTarget(texW, texH, { depthBuffer:false });
  const mesh = new THREE.Mesh(geom, mat); mesh.frustumCulled = false;
  const scene = new THREE.Scene(); scene.add(mesh);
  renderer.setRenderTarget(rt); renderer.clear(); renderer.render(scene, new THREE.Camera());
  const px = new Uint8Array(texW*texH*4);
  renderer.readRenderTargetPixels(rt, 0, 0, texW, texH, px);
  renderer.setRenderTarget(null);
  // sample centre-ish of triangle
  let maxc = 0, nonzero = 0;
  for (let i=0;i<px.length;i+=4){ const m=Math.max(px[i],px[i+1],px[i+2]); if(m>maxc)maxc=m; if(m>0)nonzero++; }
  log(label, "maxChannel:", maxc, "nonzeroTexels:", nonzero);
  rt.dispose();
}

// A) RawShaderMaterial (current approach)
bake(new THREE.RawShaderMaterial({
  side: THREE.DoubleSide,
  vertexShader: `precision highp float;
    attribute vec3 position; attribute vec3 color; attribute vec2 uv;
    varying vec3 vColor;
    void main(){ vColor = color; gl_Position = vec4(uv*2.0-1.0, 0.0, 1.0); }`,
  fragmentShader: `precision highp float; varying vec3 vColor;
    void main(){ gl_FragColor = vec4(vColor, 1.0); }`,
}), "RawShaderMaterial:");

// B) ShaderMaterial with vertexColors (three injects attributes)
bake(new THREE.ShaderMaterial({
  side: THREE.DoubleSide, vertexColors: true,
  vertexShader: `varying vec3 vColor;
    void main(){ vColor = color; gl_Position = vec4(uv*2.0-1.0, 0.0, 1.0); }`,
  fragmentShader: `varying vec3 vColor;
    void main(){ gl_FragColor = vec4(vColor, 1.0); }`,
}), "ShaderMaterial+vertexColors:");

// C) MeshBasicMaterial + onBeforeCompile hijack
const basic = new THREE.MeshBasicMaterial({ vertexColors:true, side:THREE.DoubleSide });
basic.onBeforeCompile = (sh) => {
  sh.vertexShader = sh.vertexShader.replace(
    "#include <project_vertex>",
    "gl_Position = vec4(uv*2.0-1.0, 0.0, 1.0);"
  );
};
bake(basic, "MeshBasicMaterial+hijack:");

log("done");
</script>
</body>
</html>
